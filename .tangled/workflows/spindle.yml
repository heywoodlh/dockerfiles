when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - docker-client
    - gnugrep

environment:
  TANGLED_REPO: "tangled.io/core"
  TANGLED_REV: "master"

steps:
  - name: echo docker vars
    command: |
      echo DOCKER_HOST: $DOCKER_HOST

  - name: enable multiarch docker
    command: |
      docker buildx ls | grep -q multiarch || docker buildx create --name multiarch --driver docker-container --use
      docker run --privileged --rm docker.io/tonistiigi/binfmt --install all

  - name: login to docker hub
    command: |
      echo $DOCKER_TOKEN | docker login -u heywoodlh --password-stdin

  - name: build spindle image
    command: |
      # build `version` target for deriving rev of spindle
      docker build --build-arg TANGLED_REPO="$TANGLED_REPO" --build-arg TANGLED_REV="$TANGLED_REV" -t docker.io/heywoodlh/spindle:version --target=version -f ./spindle/Dockerfile ./spindle

      # actual build/push
      docker buildx build --platform linux/amd64,linux/arm64 --build-arg TANGLED_REPO="$TANGLED_REPO" --build-arg TANGLED_REV="$TANGLED_REV" --push -t docker.io/heywoodlh/spindle:latest -t docker.io/heywoodlh/spindle:$(docker run -i --rm docker.io/heywoodlh/spindle:version) -f ./spindle/Dockerfile ./spindle

      # actual build/push (root target)
      docker buildx build --platform linux/amd64,linux/arm64 --build-arg TANGLED_REPO="$TANGLED_REPO" --build-arg TANGLED_REV="$TANGLED_REV" --target=root --push -t docker.io/heywoodlh/spindle:root -t docker.io/heywoodlh/spindle:$(docker run -i --rm docker.io/heywoodlh/spindle:version)-root -f ./spindle/Dockerfile ./spindle

