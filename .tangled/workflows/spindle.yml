when:
  - event: ["push", "manual"]
    branch: ["main"]

engine: "nixery"

dependencies:
  nixpkgs:
    - docker-client
    - gnugrep

steps:
  - name: login to docker hub
    command: |
      echo $DOCKER_TOKEN | docker login -u heywoodlh --password-stdin

  - name: enable multiarch docker
    command: |
      docker buildx ls | grep -q multiarch || docker buildx create --name multiarch --driver docker-container --use
      docker run --privileged --rm docker.io/tonistiigi/binfmt --install all

  - name: build spindle image
    command: |
      # Build `version` target for deriving rev of spindle
      docker build --build-arg TANGLED_REPO="heywoodlh.io/core" --build-arg TANGLED_REV="spindle-run" -t docker.io/heywoodlh/spindle:version --target=version -f ./spindle/Dockerfile ./spindle

      # Actual build/push
      docker buildx build --platform linux/amd64,linux/arm64 --build-arg TANGLED_REPO="heywoodlh.io/core" --build-arg TANGLED_REV="spindle-run" --push -t docker.io/heywoodlh/spindle:latest -t docker.io/heywoodlh/spindle:$(docker run -i --rm docker.io/heywoodlh/spindle:version) -f ./spindle/Dockerfile ./spindle

