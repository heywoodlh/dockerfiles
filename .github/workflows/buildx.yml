name: buildx

on:
  schedule:
    - cron: "0 0 * * Sun"
  workflow_dispatch:
  
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v1
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to DockerHub
        uses: docker/login-action@v1 
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - 
        name: Get current month
        id: date
        run: echo "::set-output name=date::$(date +%Y_%m_snapshot)"
      -
        name: Build and push port-crawler
        uses: docker/build-push-action@v2
        with:
          context: port-crawler
          platforms: linux/amd64,linux/arm64,linux/armhf
          push: true
          tags: heywoodlh/port-crawler:latest,heywoodlh/port-crawler:${{ steps.date.outputs.date }}
      -
        name: Build and push aerc
        uses: docker/build-push-action@v2
        with:
          context: aerc
          platforms: linux/amd64,linux/arm64,linux/armhf
          push: true
          tags: heywoodlh/aerc:latest,heywoodlh/aerc:${{ steps.date.outputs.date }}
      -
        name: Build and push telnet
        uses: docker/build-push-action@v2
        with:
          context: telnet
          platforms: linux/amd64,linux/arm64,linux/armhf
          push: true
          tags: heywoodlh/telnet:latest,heywoodlh/telnet:${{ steps.date.outputs.date }}
      -
        name: Build and push dev
        uses: docker/build-push-action@v2
        with:
          context: dev
          platforms: linux/amd64,linux/arm64,linux/armhf
          push: true
          tags: heywoodlh/dev:latest,heywoodlh/dev:${{ steps.date.outputs.date }}
      -
        name: Build and push kali-linux
        uses: docker/build-push-action@v2
        with:
          context: kali-linux
          platforms: linux/amd64,linux/arm64,linux/armhf
          push: true
          tags: heywoodlh/kali-linux:latest,heywoodlh/kali-linux:${{ steps.date.outputs.date }}
      -
        name: Build and push metasploit
        uses: docker/build-push-action@v2
        with:
          context: metasploit
          platforms: linux/amd64,linux/arm64,linux/armhf
          push: true
          tags: heywoodlh/metasploit:latest,heywoodlh/metasploit:${{ steps.date.outputs.date }}
