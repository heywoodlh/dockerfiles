worker_processes 1;
pid /home/nix/.nginx/nginx.pid;
error_log /dev/stderr;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;
    access_log /dev/stdout;

    client_body_temp_path /home/nix/.nginx/tmp/client_body;
    proxy_temp_path       /home/nix/.nginx/tmp/proxy;
    fastcgi_temp_path     /home/nix/.nginx/tmp/fastcgi;
    uwsgi_temp_path       /home/nix/.nginx/tmp/uwsgi;
    scgi_temp_path        /home/nix/.nginx/tmp/scgi;

    server {
        listen 8080;

        include /home/nix/.nginx/auth.conf;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
